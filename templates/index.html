<!DOCTYPE html>
<html>
<head>
    <title>Email Sender</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="card">

        <h1>📧 Automated Email Sender</h1>

        <form method="POST">

            <div class="form-group">
                <label>Recipients</label>
                <input type="text"
                       name="recipients"
                       placeholder="abc@gmail.com, xyz@gmail.com"
                       required>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text"
                       name="subject"
                       required>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea name="message"
                          rows="6"
                          required></textarea>
            </div>

            <button type="submit">
                Send Email
            </button>

        </form>
        
        {% if success %}
<div class="success">
    {{ success }}
</div>
{% endif %}

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

    </div>

</div>

</body>
</html>
